name: Trigger Dokploy deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy via API
        env:
          DOKPLOY_URL: ${{ vars.DOKPLOY_URL }}
          DOKPLOY_KEY: ${{ vars.DOKPLOY_KEY }}
        run: |
          echo "Triggering deploy for $DOKPLOY_URL"
          curl -s -X POST "${DOKPLOY_URL}/api/trpc/application.redeploy" \
            -H "x-api-key: ${DOKPLOY_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"json":{"applicationId":"3UHHbFdDgkIklUHCHSkTg"}}' \
            -w "\nHTTP %{http_code}\n"
