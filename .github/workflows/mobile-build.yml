name: Build HEAL Mobile (Android)

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.24.5'

      - name: Cache pub
        uses: actions/cache@v4
        with:
          path: |
            mobile/.dart_tool
            mobile/.flutter-plugins
            mobile/.flutter-plugins-dependencies
            mobile/.packages
            mobile/.pub
          key: ${{ runner.os }}-flutter-pub-${{ hashFiles('mobile/pubspec.lock') }}

      - name: Install
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=CDN_BASE=https://resources.positiveness.club/heal \
            --dart-define=POCKETBASE_URL=https://pocketbase.scaleupcrm.com

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: heal-mobile-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
