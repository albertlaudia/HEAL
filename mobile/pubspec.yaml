name: heal
description: HEAL — a quiet Christian mindfulness practice for iOS and Android.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── State management ───────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  hooks_riverpod: ^2.6.1

  # ── Routing ────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Audio ──────────────────────────────────────────────────────
  audioplayers: ^6.8.1  # was 6.8.0 — patch upgrade (safe)
  audio_session: ^0.1.25
  record: ^7.1.0  # voice calibration — mic recording for breath detection

  # ── Backend ────────────────────────────────────────────────────
  pocketbase: ^0.24.0  # was 0.21.0 — minor upgrade (API stable)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # ── Local storage ──────────────────────────────────────────────
  drift: ^2.31.0  # was 2.20.3 — minor upgrade (within 2.x, backwards compat)
  drift_flutter: ^0.2.8  # was 0.2.2 — minor upgrade (matches drift)
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # ── Notifications + scheduling ─────────────────────────────────
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # ── UX polish ──────────────────────────────────────────────────
  flutter_animate: ^4.5.0
  flutter_hooks: ^0.20.5
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8
  rive: ^0.13.20  # was 0.13.13 — minor upgrade (within 0.13, API stable). Used for the breath ring animation (optional fallback to CustomPainter)

  # ── Networking ─────────────────────────────────────────────────
  dio: ^5.7.0

  # ── Utilities ──────────────────────────────────────────────────
  intl: ^0.20.2
  collection: ^1.18.0
  uuid: ^4.5.1
  rxdart: ^0.28.0 # streams for audio progress + DB updates
  visibility_detector: ^0.4.0+2 # for performance-aware animations
  shimmer: ^3.0.0 # for skeleton loading states
  smooth_page_indicator: ^1.2.1 # for onboarding
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1 # for illustration caching

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.31.0  # was 2.20.3 — matches drift
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/icons/
  # Material 3 font
  # (google_fonts handles fonts dynamically)